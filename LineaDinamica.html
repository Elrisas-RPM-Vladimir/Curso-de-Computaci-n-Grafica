<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Línea Dinámica - Vladimir Ortiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .btn-back { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background-color: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
        #canvas-container { background: white; border-radius: 12px; border: 4px solid #0f172a; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header-content { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← REGRESAR</a>
    <div class="header-content">
        <h2>Función Seno Dinámica</h2>
        <h3>Estudiante: Vladimir Alexandre Ortiz Chaccara</h3>
    </div>
    <div id="canvas-container">
        <canvas id="myCanvas" width="500" height="400"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        let time = 0;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ejes
            ctx.strokeStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(0, 200); ctx.lineTo(500, 200);
            ctx.stroke();

            // Curva
            ctx.beginPath();
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 4;
            for (let x = 0; x <= 500; x++) {
                let y = Math.sin(x * 0.02 + time) * 80;
                ctx.lineTo(x, 200 - y);
            }
            ctx.stroke();
            time -= 0.05;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
