<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Traslación 3D</title>
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Escena, Cámara y Renderizador
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Geometría y Material del Cubo
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshNormalMaterial();
        const cubo = new THREE.Mesh(geometry, material);
        scene.add(cubo);

        camera.position.z = 5;

        // Lógica de Traslación
        let velocidad = 0.05;
        const limite = 2;

        function animate() {
            requestAnimationFrame(animate);

            // Traslación en el eje X
            cubo.position.x += velocidad;

            // Comprobar límites para cambiar de dirección
            if (cubo.position.x > limite || cubo.position.x < -limite) {
                velocidad *= -1;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
