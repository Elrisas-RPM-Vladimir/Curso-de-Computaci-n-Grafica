<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3D 1 - Vladimir Ortiz</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .btn-back { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background: #6366f1; color: white; text-decoration: none; border-radius: 8px; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 8px; }
        input { width: 100px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← REGRESAR</a>
    <div id="info">
        <b>Control de Movimiento</b><br>
        Velocidad: <input type="range" id="velRange" min="0" max="0.2" step="0.01" value="0.05">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const cubo = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshNormalMaterial());
        scene.add(cubo);
        camera.position.z = 5;

        let dir = 1;
        const velInput = document.getElementById('velRange');

        function animate() {
            requestAnimationFrame(animate);
            
            let speed = parseFloat(velInput.value);
            cubo.position.x += speed * dir;

            // Cálculo dinámico de límites de pantalla en Z=0
            const vFOV = THREE.MathUtils.degToRad(camera.fov);
            const height = 2 * Math.tan(vFOV / 2) * camera.position.z;
            const width = height * camera.aspect;
            const limit = width / 2 - 0.5; // 0.5 es la mitad del ancho del cubo

            if (cubo.position.x > limit || cubo.position.x < -limit) {
                dir *= -1;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
