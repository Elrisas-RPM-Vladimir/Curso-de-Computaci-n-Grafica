<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadrado y triángulo separados por línea</title>
</head>
<body>
    <h2>Crear un cuadrado y un triángulo</h2>
    <h3>Estudiante: Vladimir Alexandre Ortiz Chaccara</h3>

    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // Limpiar canvas
        ctx.clearRect(0, 0, 500, 500);

        // ========== CUADRADO (arriba) ==========
        // Cuadrado de 150x150 en posición (50, 50)
        ctx.beginPath();
        ctx.rect(50, 50, 150, 150);

        // Degradado verde a lima
        var gradSquare = ctx.createLinearGradient(50, 50, 200, 200);
        gradSquare.addColorStop(0, 'green');
        gradSquare.addColorStop(1, 'lime');
        ctx.fillStyle = gradSquare;
        ctx.fill();
        ctx.strokeStyle = "black";
        ctx.stroke();

        // ========== LÍNEA NEGRA QUE CORTA EL CUADRADO POR LA MITAD ==========
        // El cuadrado está en Y = 50 a Y = 200
        // La mitad es Y = 125
        ctx.beginPath();
        ctx.moveTo(50, 125);
        ctx.lineTo(200, 125);
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.stroke();

        // ========== TRIÁNGULO (debajo, completamente separado) ==========
        // Triángulo centrado debajo del cuadrado, empezando en Y = 210
        ctx.beginPath();
        ctx.moveTo(75, 350);   // base izquierda
        ctx.lineTo(175, 350);  // base derecha
        ctx.lineTo(125, 210);  // vértice superior (toca justo debajo de la línea)
        ctx.closePath();

        // Degradado rojo a amarillo
        var gradTri = ctx.createLinearGradient(125, 210, 125, 350);
        gradTri.addColorStop(0, 'red');
        gradTri.addColorStop(1, 'yellow');
        ctx.fillStyle = gradTri;
        ctx.fill();
        ctx.strokeStyle = "black";
        ctx.stroke();

        ctx.lineWidth = 1;
    </script>
</body>
</html>
