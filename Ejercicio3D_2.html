<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3D 2 - Vladimir Ortiz</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #0f172a; }
        .btn-back { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background: #6366f1; color: white; text-decoration: none; border-radius: 8px; z-index: 10; }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; color: #94a3b8; pointer-events: none; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← REGRESAR</a>
    <div id="msg">Arrastra el mouse para manipular | 2s de inactividad para auto-rotación</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const cubo = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshNormalMaterial());
        scene.add(cubo);
        camera.position.z = 5;

        let isInteracting = false;
        let lastInteractionTime = 0;

        window.addEventListener('mousedown', () => isInteracting = true);
        window.addEventListener('mouseup', () => {
            isInteracting = false;
            lastInteractionTime = Date.now();
        });
        window.addEventListener('mousemove', (e) => {
            if (isInteracting) {
                cubo.rotation.y += e.movementX * 0.01;
                cubo.rotation.x += e.movementY * 0.01;
                lastInteractionTime = Date.now();
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const timeSinceLastAction = Date.now() - lastInteractionTime;

            if (!isInteracting && timeSinceLastAction > 2000) {
                cubo.rotation.x += 0.01;
                cubo.rotation.y += 0.02;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
