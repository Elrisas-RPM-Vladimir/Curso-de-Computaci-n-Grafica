<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Barras - Vladimir Ortiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .btn-back { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background-color: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .btn-back:hover { background-color: #4f46e5; transform: translateX(-5px); }

        .header-content { text-align: center; margin-bottom: 25px; }
        h2 { margin: 0; color: #0f172a; }
        h3 { font-weight: 400; color: #64748b; font-size: 0.9rem; }

        .chart-container { background: white; padding: 40px; border-radius: 12px; border: 4px solid #0f172a; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: flex-end; gap: 20px; height: 300px; }
        
        .bar { width: 50px; position: relative; border-radius: 4px 4px 0 0; transition: transform 0.3s; }
        .bar:hover { transform: scaleY(1.05); }
        .label { position: absolute; top: -25px; width: 100%; text-align: center; font-weight: 600; font-size: 0.8rem; }
        
        .b1 { height: 50%; background: linear-gradient(to top, #ef4444, #f87171); }
        .b2 { height: 60%; background: linear-gradient(to top, #3b82f6, #60a5fa); }
        .b3 { height: 70%; background: linear-gradient(to top, #10b981, #34d399); }
        .b4 { height: 90%; background: linear-gradient(to top, #f59e0b, #fbbf24); }
        .b5 { height: 100%; background: linear-gradient(to top, #8b5cf6, #a78bfa); }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← REGRESAR</a>
    <div class="header-content">
        <h2>Reporte Estadístico</h2>
        <h3>Estudiante: Vladimir Alexandre Ortiz Chaccara</h3>
    </div>
    <div class="chart-container">
        <div class="bar b1"><span class="label">50%</span></div>
        <div class="bar b2"><span class="label">60%</span></div>
        <div class="bar b3"><span class="label">70%</span></div>
        <div class="bar b4"><span class="label">90%</span></div>
        <div class="bar b5"><span class="label">100%</span></div>
    </div>
</body>
</html>
