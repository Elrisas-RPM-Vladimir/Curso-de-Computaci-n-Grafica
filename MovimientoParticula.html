<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partículas Fluidas - Vladimir Ortiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .btn-back { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background-color: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
        .header-content { text-align: center; margin-bottom: 20px; }
        #canvas-container { background: #ffffff; border-radius: 12px; border: 4px solid #0f172a; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← REGRESAR</a>
    <div class="header-content">
        <h2>Sistema de Partículas Cinético</h2>
        <h3>Estudiante: Vladimir Alexandre Ortiz Chaccara</h3>
    </div>
    <div id="canvas-container">
        <canvas id="particleCanvas" width="600" height="400"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // Crear partículas con velocidad para fluidez
        let particles = Array.from({ length: 12 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 4, // Velocidad horizontal
            vy: (Math.random() - 0.5) * 4, // Velocidad vertical
            radius: 8 + Math.random() * 10,
            color: `hsl(${Math.random() * 360}, 70%, 60%)`
        }));

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                // Dibujar
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Mover con fluidez
                p.x += p.vx;
                p.y += p.vy;

                // Rebotar en bordes del recuadro
                if (p.x + p.radius > canvas.width || p.x - p.radius < 0) p.vx *= -1;
                if (p.y + p.radius > canvas.height || p.y - p.radius < 0) p.vy *= -1;
            });
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
