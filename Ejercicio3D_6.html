<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3D 6 - Vladimir Ortiz</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .btn-back { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background: #6366f1; color: white; text-decoration: none; border-radius: 8px; z-index: 10; }
        #info { position: absolute; top: 80px; left: 20px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 10px; border: 2px solid #6366f1; font-size: 13px; }
        kbd { background: #eee; padding: 2px 5px; border-radius: 3px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← REGRESAR</a>
    <div id="info">
        <b>PANEL DE CONTROL</b><br><br>
        🚀 <kbd>WASD</kbd> : Rotación Libre<br>
        ↔️ <kbd>Flechas</kbd> : Traslación<br>
        🔍 <kbd>Z</kbd> / <kbd>X</kbd> : Escalar +/-
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e293b);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const cubo = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshNormalMaterial());
        scene.add(cubo);
        camera.position.z = 5;

        window.addEventListener('keydown', (e) => {
            const step = 0.1;
            const rotStep = 0.15;
            switch(e.key.toLowerCase()) {
                // Rotación WASD
                case 'w': cubo.rotation.x -= rotStep; break;
                case 's': cubo.rotation.x += rotStep; break;
                case 'a': cubo.rotation.y -= rotStep; break;
                case 'd': cubo.rotation.y += rotStep; break;
                // Traslación Flechas
                case 'arrowup':    cubo.position.y += step; break;
                case 'arrowdown':  cubo.position.y -= step; break;
                case 'arrowleft':  cubo.position.x -= step; break;
                case 'arrowright': cubo.position.x += step; break;
                // Escalado
                case 'z': cubo.scale.multiplyScalar(1.1); break;
                case 'x': if(cubo.scale.x > 0.2) cubo.scale.multiplyScalar(0.9); break;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
<!--investigar para que los cubos no salgan de los limites de la pantalla y darles un diseño bonito como tambien evitar que se deformen al usar la camara para ver de distintos angulos-->
