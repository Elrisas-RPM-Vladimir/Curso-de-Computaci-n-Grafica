<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Línea Dinámica</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        canvas { background-color: #fafafa; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Gráfico de una función dinámica</h2>
    <h3>Creado por: Vladimir Alexandre Ortiz Chaccara</h3>
    
    <canvas id='myCanvas' width='500' height='500' style='border:1px solid #000000;'></canvas>

    <script>
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');

        // Variables necesarias para el gráfico
        var xstart = 0; 
        var xend = 500;  // Corregido: antes era yend
        var step = 1;    // Un paso de 1 es suficiente para líneas suaves en píxeles
        var time = 0;    // Variable de tiempo para animación

        function drawGraph() {
            // Limpiar el lienzo
            ctx.clearRect(0, 0, canvas.width, canvas.height); 

            // Dibujar ejes x
                ctx.beginPath();
                ctx.strokeStyle = 'black';
                ctx.moveTo(0, canvas.height / 2);
                ctx.lineTo(canvas.width, canvas.height / 2);
                ctx.stroke();

            // Dibujar ejes y
                ctx.beginPath();
                ctx.strokeStyle = 'black';
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();

            // Configuración de la línea de la función
            ctx.beginPath();
            ctx.strokeStyle = 'blue'; // Corregido: era strongStyle
            ctx.lineWidth = 2;

            // Dibujar la función Y = sin(x)
            for (var x = xstart; x <= xend; x += step) {
                // Ajustamos la frecuencia (0.02) y la amplitud (100)
                var y = Math.sin(x * 0.02 + time); 
                
                // Calculamos la posición real en el canvas
                var canvasX = x;
                var canvasY = canvas.height / 2 - y * 100;

                if (x === xstart) {
                    ctx.moveTo(canvasX, canvasY);
                } else {
                    ctx.lineTo(canvasX, canvasY);
                }
            }

            ctx.stroke(); 
        }

        function animate() {
            time -= 0.05; // Velocidad de la animación (cambia el signo para dirección)
            drawGraph(); 
            requestAnimationFrame(animate); 
        }

        // Iniciar la animación
        animate();
    </script> 
</body>
</html>
