<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Líneas Alternas - Vladimir Ortiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; } /* Fondo oscuro para contraste */
        body { font-family: 'Inter', sans-serif; background-color: #1e293b; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: white; }
        .btn-back { position: fixed; top: 20px; left: 20px; padding: 10px 20px; background-color: var(--primary); color: white; text-decoration: none; border-radius: 8px; }
        #canvas-container { background: #0f172a; border-radius: 12px; border: 4px solid #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .header-content { text-align: center; margin-bottom: 20px; }
        h3 { color: #94a3b8; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← REGRESAR</a>
    <div class="header-content">
        <h2>Frecuencia Alterna</h2>
        <h3>Estudiante: Vladimir Alexandre Ortiz Chaccara</h3>
    </div>
    <div id="canvas-container">
        <canvas id="myCanvas" width="500" height="400"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        let time = 0;

        function animate() {
            ctx.fillStyle = "rgba(15, 23, 42, 0.2)"; // Efecto de estela
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.strokeStyle = '#10b981'; // Verde neón
            ctx.lineWidth = 2;
            for (let x = 0; x <= 500; x++) {
                let y = Math.sin(x * 0.03 + time) * 100;
                ctx.lineTo(x, 200 - y);
            }
            ctx.stroke();
            time += 0.08;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
